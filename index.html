<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gnawsys</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23222'/><text x='50' y='50' font-size='88' text-anchor='middle' dominant-baseline='central' fill='%23e4e4e4' font-family='serif'>ג</text></svg>">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fafafa;
  --card: #fff;
  --border: #e8e8e8;
  --hebrew: #1a1a1a;
  --translit: #6b6b6b;
  --english: #9a9a9a;
  --header: #bbb;
  --badge-bg: #f0f0f0;
  --badge-fg: #777;
  --badge-border: #e0e0e0;
  --hl: rgba(59, 130, 246, 0.15);
  --hl-border: rgba(59, 130, 246, 0.35);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0c0c0c;
    --card: #161616;
    --border: #222;
    --hebrew: #e4e4e4;
    --translit: #7a7a7a;
    --english: #555;
    --header: #444;
    --badge-bg: #1e1e1e;
    --badge-fg: #666;
    --badge-border: #2a2a2a;
    --hl: rgba(59, 130, 246, 0.12);
    --hl-border: rgba(59, 130, 246, 0.3);
  }
}

body {
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.wrap {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 1rem 4rem;
}

header {
  text-align: center;
  padding: 2rem 0 1.25rem;
  color: var(--header);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 500;
}

.sentence {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem 1.4rem;
  margin-bottom: 0.6rem;
  opacity: 0;
  transform: translateY(6px);
  animation: show 0.35s ease forwards;
}

@keyframes show {
  to { opacity: 1; transform: none; }
}

.heb {
  font-size: 1.45rem;
  font-weight: 600;
  color: var(--hebrew);
  direction: rtl;
  text-align: right;
  line-height: 1.55;
  margin-bottom: 0.3rem;
}

.tr {
  font-size: 0.92rem;
  font-style: italic;
  color: var(--translit);
  line-height: 1.4;
  margin-bottom: 0.15rem;
}

.en {
  font-size: 0.85rem;
  color: var(--english);
  line-height: 1.4;
}

.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-top: 0.55rem;
}

.badge {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  padding: 0.15rem 0.45rem;
  border-radius: 4px;
  background: var(--badge-bg);
  color: var(--badge-fg);
  border: 1px solid var(--badge-border);
  line-height: 1.4;
  white-space: nowrap;
}

/* Hover highlighting */
.w {
  border-radius: 3px;
  padding: 0 1px;
  transition: background 0.1s, box-shadow 0.1s;
  cursor: default;
}

.w.hl {
  background: var(--hl);
  box-shadow: 0 0 0 1.5px var(--hl-border);
}

.en.hl-line {
  background: var(--hl);
  border-radius: 3px;
  box-shadow: 0 0 0 1.5px var(--hl-border);
}

#sentinel { height: 1px; }

@media (max-width: 480px) {
  .wrap { padding: 0 0.75rem 3rem; }
  header { padding: 1.5rem 0 1rem; }
  .sentence { padding: 1rem 1.1rem; border-radius: 8px; }
  .heb { font-size: 1.3rem; }
  .badges { gap: 0.25rem; margin-top: 0.45rem; }
  .badge { font-size: 0.6rem; padding: 0.12rem 0.35rem; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>gnawsys</header>
  <div id="feed"></div>
  <div id="sentinel"></div>
</div>
<script>
const BATCH = 20;
let busy = false;
let pool = [];
let poolIdx = 0;

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildCard(s) {
  const el = document.createElement('div');
  el.className = 'sentence';

  const heWords = s.hebrew.split(/\s+/);
  const trWords = s.transliteration.split(/\s+/);
  const enWords = s.english.split(/\s+/);

  const hebHtml = heWords.map((w, i) =>
    `<span class="w" data-w="${i}">${esc(w)}</span>`
  ).join(' ');

  const trHtml = trWords.map((w, i) =>
    `<span class="w" data-w="${i}">${esc(w)}</span>`
  ).join(' ');

  const aligned = enWords.length === heWords.length;
  const enHtml = aligned
    ? enWords.map((w, i) => `<span class="w" data-w="${i}">${esc(w)}</span>`).join(' ')
    : esc(s.english);

  const badges = (s.tag || '').split(',')
    .map(t => t.trim())
    .filter(Boolean)
    .map(t => `<span class="badge">${esc(t)}</span>`)
    .join('');

  el.innerHTML =
    `<div class="heb">${hebHtml}</div>` +
    `<div class="tr">${trHtml}</div>` +
    `<div class="en"${aligned ? '' : ' data-noalign="1"'}>${enHtml}</div>` +
    (badges ? `<div class="badges">${badges}</div>` : '');

  return el;
}

// Hover highlighting
document.addEventListener('pointerenter', (e) => {
  const w = e.target.closest('.w');
  if (!w) return;
  const card = w.closest('.sentence');
  if (!card) return;
  const idx = w.dataset.w;
  card.querySelectorAll(`.w[data-w="${idx}"]`).forEach(el => el.classList.add('hl'));
  const enDiv = card.querySelector('.en[data-noalign]');
  if (enDiv) enDiv.classList.add('hl-line');
}, true);

document.addEventListener('pointerleave', (e) => {
  const w = e.target.closest('.w');
  if (!w) return;
  const card = w.closest('.sentence');
  if (!card) return;
  card.querySelectorAll('.w.hl').forEach(el => el.classList.remove('hl'));
  const enDiv = card.querySelector('.en.hl-line');
  if (enDiv) enDiv.classList.remove('hl-line');
}, true);

function drawBatch() {
  const feed = document.getElementById('feed');
  for (let i = 0; i < BATCH; i++) {
    if (poolIdx >= pool.length) {
      shuffle(pool);
      poolIdx = 0;
    }
    const el = buildCard(pool[poolIdx++]);
    el.style.animationDelay = `${i * 40}ms`;
    feed.appendChild(el);
  }
}

async function load() {
  if (busy) return;
  busy = true;
  if (pool.length === 0) {
    try {
      const r = await fetch('sentences.json');
      pool = await r.json();
      shuffle(pool);
    } catch (e) {
      // Fallback to API for local dev with server.py
      try {
        const r = await fetch(`/api/sentences?n=${BATCH}`);
        const data = await r.json();
        const feed = document.getElementById('feed');
        data.forEach((s, i) => {
          const el = buildCard(s);
          el.style.animationDelay = `${i * 40}ms`;
          feed.appendChild(el);
        });
        busy = false;
        return;
      } catch (e2) {
        console.error(e2);
        busy = false;
        return;
      }
    }
  }
  drawBatch();
  busy = false;
}

new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) load();
}, { rootMargin: '300px' }).observe(document.getElementById('sentinel'));

load();
</script>
</body>
</html>
